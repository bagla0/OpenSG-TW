name: opensg_jax_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - numpy>=1.24
  - scipy>=1.11
  - pyyaml>=6.0
  - matplotlib
  - pip
  - pip:
      - jax[cpu]           # CPU JAX; change to jax[cuda12] for GPU
      - pypardiso          # Intel MKL PARDISO sparse solver
      - pytest>=7.0
      - pytest-cov
